name: CI pipeline for order-service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: 

jobs:
  CI_job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run:   npm ci 
        
      - name: Run Lint 
        run:  npm run lint 
        continue-on-error: true

  cd:
    needs: CI_job
    runs-on: ubuntu-latest
    environment:  
      name: production 
    if: github.ref_name == 'main' 
    
    steps:
      - uses: actions/checkout@v4

      - name: "Configure AWS Credentials"    
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1 
          aws-access-key-id:  ${{ secrets.AWS_ACCESS_KEY_ID }} 
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY  }} 
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            484907510239.dkr.ecr.us-east-1.amazonaws.com/order-service:latest
            484907510239.dkr.ecr.us-east-1.amazonaws.com/order-service:${{ github.sha }}
            484907510239.dkr.ecr.us-east-1.amazonaws.com/order-service:v1.${{ github.run_number }}
